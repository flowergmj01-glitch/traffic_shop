            { id: 178, jp: "一番[いちばん]人気[にんき]のものはどれですか", cn: "哪一個是最受歡迎的？", v: { w: "人気[にんき]", m: "受歡迎", ej: "この店[みせ]は人気[にんき]があります。", ec: "這家店很受歡迎。", extW: "流行[はや]る", extM: "流行", extEj: "若者[わかもの]の間[あいだ]で流行[はや]っている店[みせ]です。", extEc: "在年輕人之間很流行的店。" }, g: { p: "一番[いちばん]〜", m: "最...", ej: "一番[いちばん]安[やす]いのはどれですか。", ec: "最便宜的是哪一個？" } },
            { id: 179, jp: "領収書[りょうしゅうしょ]をお願[ねが]いします", cn: "請給我收據", v: { w: "領収書[りょうしゅうしょ]", m: "收據", ej: "領収書[りょうしゅうしょ]をもらいます。", ec: "拿收據。", extW: "宛名[あてな]", extM: "抬頭", extEj: "領収書[りょうしゅうしょ]の宛名[あてな]はどうしますか。", extEc: "收據的抬頭要怎麼寫？" }, g: { p: "名詞＋をお願[ねが]いします", m: "麻煩給我...", ej: "タオルをお願[ねが]いします。", ec: "麻煩給我毛巾。" } }
        ];

        // 交通與觀光相關 Emoji 池
        const transportEmojis = ["🚆", "🚌", "🚕", "🚇", "🚏", "🚦", "🗺️", "🚉", "🚅", "🛍️", "🍜", "📸", "⛩️", "🏨"];

        // 整理資料成每頁 2 句 -> 總共 30 頁
        const pagesData = [];
        for (let i = 0; i < sentences.length; i += 2) {
            pagesData.push({
                p: (i / 2) + 1,
                s1: sentences[i],
                s2: sentences[i+1],
                bgEmojis: [
                    transportEmojis[i % transportEmojis.length],
                    transportEmojis[(i + 1) % transportEmojis.length],
                    transportEmojis[(i + 2) % transportEmojis.length]
                ]
            });
        }
        const totalPages = pagesData.length; // 30 pages

        // === 漢字[假名] -> Ruby 解析器 ===
        const parseFurigana = (text) => {
          if (!text) return text;
          const regex = /([\u4e00-\u9fff々]+)\[([ぁ-んァ-ンa-zA-Z0-9]+)\]/g;
          const elements = [];
          let lastIndex = 0;
          let match;

          while ((match = regex.exec(text)) !== null) {
            if (match.index > lastIndex) {
              elements.push(<span key={`text-${lastIndex}`}>{text.substring(lastIndex, match.index)}</span>);
            }
            elements.push(
              <ruby key={`ruby-${match.index}`} className="group relative px-[2px]">
                {match[1]}
                <rt className="text-[0.55em] text-gray-500 font-bold leading-none -translate-y-1">{match[2]}</rt>
              </ruby>
            );
            lastIndex = regex.lastIndex;
          }
          if (lastIndex < text.length) {
            elements.push(<span key={`text-${lastIndex}`}>{text.substring(lastIndex)}</span>);
          }
          return elements;
        };

        // === 封面元件 (Page 0) ===
        const CoverPage = ({ onNext }) => (
          <div className="a4-landscape flex flex-col items-center justify-center bg-blue-50 border-[12px] border-blue-300 relative page-flip-anim cursor-pointer" onClick={onNext}>
            {/* Background Colorful Emojis */}
            <div className="bg-emoji top-10 left-10 rotate-12" style={{opacity: 0.25, fontSize: '7rem'}}>🚆</div>
            <div className="bg-emoji bottom-10 right-10 -rotate-12" style={{opacity: 0.25, fontSize: '7rem'}}>🛍️</div>
            <div className="bg-emoji top-20 right-20" style={{opacity: 0.2, fontSize: '6rem'}}>🚌</div>
            <div className="bg-emoji bottom-20 left-20" style={{opacity: 0.2, fontSize: '6rem'}}>📸</div>
            <div className="bg-emoji top-1/3 left-1/4 rotate-45" style={{opacity: 0.15, fontSize: '5rem'}}>🗺️</div>
            <div className="bg-emoji bottom-1/3 right-1/4 -rotate-45" style={{opacity: 0.15, fontSize: '5rem'}}>🏨</div>

            <div className="bg-white/95 p-16 rounded-[2.5rem] shadow-2xl backdrop-blur-md text-center border-4 border-yellow-300 z-10 w-4/5 relative">
              <div className="absolute -top-10 -left-10 text-7xl rotate-[-15deg] drop-shadow-lg">🚅</div>
              <div className="absolute -bottom-8 -right-8 text-7xl rotate-[15deg] drop-shadow-lg">🍜</div>
              
              <h2 className="text-3xl text-blue-500 font-bold mb-6 tracking-widest bg-blue-100 inline-block px-8 py-2.5 rounded-full">實用日語對話集</h2>
              <h1 className="text-7xl font-black text-gray-800 mb-10 leading-tight drop-shadow-sm">
                500金句<br/>
                <span className="text-orange-500">交通＆觀光篇</span> 🚉🛍️
              </h1>
              <div className="inline-block bg-yellow-400 text-yellow-900 px-10 py-3.5 rounded-full text-3xl font-black shadow-lg border-2 border-yellow-500">
                No.120 ～ No.179
              </div>
              <p className="mt-8 text-gray-600 font-bold text-xl">每頁 2 句 ＋ N4/N3 延伸單字補充</p>
            </div>
            
            <div className="absolute bottom-6 right-10 text-blue-400 text-2xl font-black animate-pulse">
              點擊畫面翻開第一頁 ➡️
            </div>
          </div>
        );

        // === 金句卡片元件 (一頁兩句配置，加入延伸單字) ===
        const SentenceCard = ({ data, theme }) => {
            if (!data) return null;
            const colors = {
                1: { bg: 'bg-pink-50', border: 'border-pink-200', tag: 'bg-pink-500', text: 'text-pink-700', boxBorder: 'border-pink-100', icon: 'bg-pink-400' },
                2: { bg: 'bg-blue-50', border: 'border-blue-200', tag: 'bg-blue-500', text: 'text-blue-700', boxBorder: 'border-blue-100', icon: 'bg-blue-400' },
                3: { bg: 'bg-yellow-50', border: 'border-yellow-200', tag: 'bg-yellow-500', text: 'text-yellow-700', boxBorder: 'border-yellow-100', icon: 'bg-yellow-500' },
                4: { bg: 'bg-purple-50', border: 'border-purple-200', tag: 'bg-purple-500', text: 'text-purple-700', boxBorder: 'border-purple-100', icon: 'bg-purple-400' }
            };
            const c = colors[theme];

            return (
              <div className={`flex-1 ${c.bg} rounded-3xl p-6 border-[3px] ${c.border} shadow-sm flex flex-col relative overflow-hidden`}>
                <div className="flex justify-between items-start mb-4 z-10">
                  <span className={`${c.tag} text-white text-xl px-5 py-2 rounded-full shadow-md font-black tracking-widest border border-white/50`}>
                    No. {data.id}
                  </span>
                </div>
                
                {/* 標題句 */}
                <div className="mb-4 px-2 z-10 text-center">
                  <h3 className={`text-[1.8rem] font-black ${c.text} leading-tight`}>
                    {parseFurigana(data.jp)}
                  </h3>
                  <p className="text-[1.25rem] text-gray-800 font-bold bg-white/90 py-2 px-6 rounded-2xl inline-block shadow-sm border border-gray-100 mt-3">
                    {data.cn}
                  </p>
                </div>

                {/* 延伸學習區 (單字 + 文法) */}
                <div className="mt-auto flex flex-col gap-3 z-10">
                    
                    {/* 整合的單字卡 (原單字 + N4/N3延伸) */}
                    <div className={`bg-white/85 p-4 rounded-2xl border-2 ${c.boxBorder} shadow-sm flex flex-col gap-3`}>
                        {/* 原始單字 */}
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <span className={`${c.icon} text-white text-sm px-3 py-1 rounded-lg font-black`}>單字</span>
                                <span className="font-black text-xl text-gray-800">{parseFurigana(data.v.w)}</span>
                                <span className="text-gray-500 text-base font-bold">({data.v.m})</span>
                            </div>
                            <div className="pl-2 border-l-4 border-gray-200">
                                <p className="text-[1.1rem] font-bold text-gray-800">{parseFurigana(data.v.ej)}</p>
                                <p className="text-[1rem] text-gray-500 font-bold mt-0.5">{data.v.ec}</p>
                            </div>
                        </div>
                        
                        {/* 延伸補充 (N4-N3) */}
                        <div className="border-t-[1.5px] border-gray-200/80 pt-3">
                            <div className="flex items-center gap-3 mb-2">
                                <span className={`bg-indigo-400 text-white text-sm px-3 py-1 rounded-lg font-black`}>N4-N3 延伸</span>
                                <span className="font-black text-xl text-indigo-900">{parseFurigana(data.v.extW)}</span>
                                <span className="text-gray-500 text-base font-bold">({data.v.extM})</span>
                            </div>
                            <div className="pl-2 border-l-4 border-indigo-200">
                                <p className="text-[1.1rem] font-bold text-gray-800">{parseFurigana(data.v.extEj)}</p>
                                <p className="text-[1rem] text-gray-500 font-bold mt-0.5">{data.v.extEc}</p>
                            </div>
                        </div>
                    </div>

                    {/* 文法卡 */}
                    <div className={`bg-white/85 p-4 rounded-2xl border-2 ${c.boxBorder} shadow-sm`}>
                        <div className="flex items-center gap-3 mb-2">
                            <span className={`${c.icon} text-white text-sm px-3 py-1 rounded-lg font-black`}>文法</span>
                            <span className="font-black text-xl text-gray-800">{parseFurigana(data.g.p)}</span>
                            <span className="text-gray-500 text-base font-bold">({data.g.m})</span>
                        </div>
                        <div className="pl-2 border-l-4 border-gray-200">
                            <p className="text-[1.1rem] font-bold text-gray-800">{parseFurigana(data.g.ej)}</p>
                            <p className="text-[1rem] text-gray-500 font-bold mt-0.5">{data.g.ec}</p>
                        </div>
                    </div>
                </div>
              </div>
            );
        };

        // === 內容頁元件 ===
        const ContentPage = ({ data }) => (
          <div className="a4-landscape bg-white flex flex-col relative border-[6px] border-gray-100 page-flip-anim" key={`page-${data.p}`}>
            {/* Background Emojis */}
            {data.bgEmojis && data.bgEmojis.map((emoji, index) => (
                <div key={index} className={`bg-emoji ${index === 0 ? 'top-8 left-8 rotate-12' : index === 1 ? 'bottom-8 right-8 -rotate-12' : 'top-1/2 left-1/2 opacity-[0.08]'}`} style={{fontSize: index===2?'14rem':'5rem', zIndex: 0}}>
                    {emoji}
                </div>
            ))}

            {/* Header */}
            <div className="flex justify-between items-end border-b-[5px] border-yellow-300 pb-3 mb-5 shrink-0 z-10">
              <h2 className="text-3xl font-black text-orange-600 flex items-center bg-orange-50 px-6 py-2 rounded-t-2xl">
                <span className="text-4xl mr-3">🚌</span> 500金句：交通＆觀光篇
              </h2>
              <div className="text-yellow-800 font-black bg-yellow-200 px-6 py-2 rounded-full shadow-sm text-xl border-2 border-yellow-300">
                Page {data.p} / {totalPages}
              </div>
            </div>

            {/* Content: 2 Columns */}
            <div className="flex gap-6 flex-1 z-10 h-full">
              {data.s1 && <SentenceCard data={data.s1} theme={(data.p % 2 === 1) ? 1 : 3} />}
              {data.s2 && <SentenceCard data={data.s2} theme={(data.p % 2 === 1) ? 2 : 4} />}
            </div>
          </div>
        );

        // === 主程式 ===
        function App() {
          const [currentPage, setCurrentPage] = useState(0);

          const handleNext = () => {
              if (currentPage < totalPages) {
                  setCurrentPage(prev => prev + 1);
              }
          };

          const handlePrev = () => {
              if (currentPage > 0) {
                  setCurrentPage(prev => prev - 1);
              }
          };

          return (
            <div className="flex flex-col items-center w-full max-w-6xl">
              
              {/* 畫面展示區 */}
              <div className="w-full relative">
                  {currentPage === 0 ? (
                      <CoverPage onNext={handleNext} />
                  ) : (
                      <ContentPage data={pagesData[currentPage - 1]} />
                  )}
              </div>

              {/* 翻頁控制面板 */}
              <div className="mt-10 flex items-center gap-8 bg-white px-8 py-4 rounded-full shadow-lg border-2 border-gray-200">
                  <button 
                      onClick={handlePrev} 
                      disabled={currentPage === 0}
                      className={`text-2xl font-black px-6 py-3 rounded-full transition-all duration-200 flex items-center gap-2
                          ${currentPage === 0 ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-blue-100 text-blue-600 hover:bg-blue-200 hover:scale-105 shadow-md'}`}
                  >
                      ⬅️ 上一頁
                  </button>
                  
                  <div className="text-2xl font-black text-gray-500 w-32 text-center">
                      {currentPage === 0 ? "封面" : `${currentPage} / ${totalPages}`}
                  </div>

                  <button 
                      onClick={handleNext} 
                      disabled={currentPage === totalPages}
                      className={`text-2xl font-black px-6 py-3 rounded-full transition-all duration-200 flex items-center gap-2
                          ${currentPage === totalPages ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-blue-500 text-white hover:bg-blue-600 hover:scale-105 shadow-md'}`}
                  >
                      下一頁 ➡️
                  </button>
              </div>
              
            </div>
          );
        }

        // === 渲染至 DOM ===
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
